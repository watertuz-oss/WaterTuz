<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">

<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="مركز ماء طوز">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>مركز ماء طوز – الواردات</title>

<style>
*{
  box-sizing:border-box;
  touch-action:manipulation;
}

html, body{
  margin:0;
  padding:0;
  font-family:Tahoma, Arial, sans-serif;
  direction:rtl;
  background:#f0f2f5;
  overscroll-behavior:none;
}

/* TopBar */
#topbar{
  position:fixed;
  top:0;
  right:0;
  width:100%;
  height:60px;
  background:linear-gradient(90deg,#0d47a1,#1976d2);
  color:#fff;
  display:flex;
  align-items:center;
  padding-right:55px;
  box-shadow:0 3px 8px rgba(0,0,0,0.3);
  z-index:1000;
}

#app-title{
  font-size:18px;
  font-weight:bold;
}

/* زر القائمة */
#hamburger{
  position:absolute;
  right:15px;
  top:18px;
  width:30px;
  height:22px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  cursor:pointer;
}

#hamburger span{
  height:4px;
  background:#fff;
  border-radius:3px;
  transition:0.3s;
}

#hamburger.open span:nth-child(1){
  transform:rotate(45deg) translate(5px,5px);
}
#hamburger.open span:nth-child(2){
  opacity:0;
}
#hamburger.open span:nth-child(3){
  transform:rotate(-45deg) translate(6px,-6px);
}

/* القائمة */
#sidebar{
  position:fixed;
  top:0;
  right:0;
  width:0;
  height:100%;
  background:linear-gradient(#1976d2,#0d47a1);
  overflow:hidden;
  transition:0.35s;
  padding-top:70px;
  z-index:999;
}

#sidebar button{
  width:100%;
  background:none;
  border:none;
  color:white;
  padding:16px 20px;
  text-align:right;
  font-size:18px;
  cursor:pointer;
}

#sidebar button:hover{
  background:rgba(255,255,255,0.15);
}

/* overlay */
#overlay{
  position:fixed;
  top:0;
  right:0;
  width:0;
  height:100%;
  background:rgba(0,0,0,0.4);
  z-index:998;
}

/* المحتوى */
#content{
  margin-top:60px;
  height:calc(100vh - 60px);
}

iframe{
  width:100%;
  height:100%;
  border:none;
  background:#fff;
}
</style>
</head>

<body>

<div id="topbar">
  <div id="app-title">قائمة تسعيرات 👉</div>
  <div id="hamburger" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </div>
</div>

<div id="sidebar">
  <button onclick="openPage('page1.html')">🏠 السكني</button>
  <button onclick="openPage('page2.html')">🏢 الحكومي</button>
  <button onclick="openPage('page3.html')">🏭 التجاري</button>
  <button onclick="openPage('page4.html')">⚡ المولدات</button>
  <button onclick="openPage('page5.html')">📍 حسب المناطق</button>
</div>

<div id="overlay" onclick="closeMenu()"></div>

<div id="content">
  <iframe id="mainFrame" src="page1.html"></iframe>
</div>

<script>
let opened=false;
const sidebar=document.getElementById("sidebar");
const overlay=document.getElementById("overlay");
const hamburger=document.getElementById("hamburger");

function toggleMenu(){
  opened ? closeMenu() : openMenu();
}

function openMenu(){
  sidebar.style.width="240px";
  overlay.style.width="100%";
  hamburger.classList.add("open");
  opened=true;
}

function closeMenu(){
  sidebar.style.width="0";
  overlay.style.width="0";
  hamburger.classList.remove("open");
  opened=false;
}

function openPage(p){
  document.getElementById("mainFrame").src=p;
  closeMenu();
}
</script>

<!-- Service Worker + تحديث تلقائي -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js").then(reg => {

    reg.onupdatefound = () => {
      const newWorker = reg.installing;

      newWorker.onstatechange = () => {
        if (newWorker.state === "installed") {
          if (navigator.serviceWorker.controller) {
            location.reload();
          }
        }
      };
    };

  });
}
</script>

<!-- منع إطفاء الشاشة -->
<script>
let wakeLock = null;

async function keepScreenOn() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      console.log("🔆 الشاشة شغالة");
    }
  } catch (err) {
    console.log(err);
  }
}

document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") {
    keepScreenOn();
  }
});

keepScreenOn();
</script>

</body>
</html>
